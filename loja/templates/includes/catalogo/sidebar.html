        <aside class="store-sidebar">
            <button class="menu-mark" type="button" aria-label="Menu"></button>
            <h2>Produtos</h2>
            <nav class="categories" aria-label="Categorias">
                <a class="{% if not categoria_ativa %}active{% endif %}" href="{{ loja.get_absolute_url }}?{% if ordenacao %}ordenacao={{ ordenacao }}&{% endif %}{% if filtro %}filtro={{ filtro }}&{% endif %}{% if vendedor_codigo %}vendedor={{ vendedor_codigo }}&{% endif %}">Todos</a>
                {% for categoria in categorias %}
                    <a class="{% if categoria_ativa == categoria.id|stringformat:'s' %}active{% endif %}"
                       href="?categoria={{ categoria.id }}{% if busca %}&q={{ busca|urlencode }}{% endif %}{% if filtro %}&filtro={{ filtro }}{% endif %}{% if ordenacao %}&ordenacao={{ ordenacao }}{% endif %}{% if vendedor_codigo %}&vendedor={{ vendedor_codigo }}{% endif %}">
                        {{ categoria.nome }}
                    </a>
                {% endfor %}
            </nav>
        </aside>
