<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nova senha - VestLink</title>
    <link rel="stylesheet" href="/static/css/catalogo.css?v=75">
</head>
<body class="auth-page">
    <main class="auth-card">
        <p class="eyebrow">Recuperar acesso</p>
        <h1>Criar nova senha</h1>
        {% if validlink %}
            <form class="panel-form" method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Salvar nova senha</button>
            </form>
        {% else %}
            <p>Esse link expirou ou já foi usado. Solicite uma nova recuperação.</p>
            <p><a href="{% url 'recuperar_senha' %}">Pedir novo link</a></p>
        {% endif %}
    </main>
</body>
</html>
