<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recuperar senha - VestLink</title>
    <link rel="stylesheet" href="/static/css/variables.css?v=76">
    <link rel="stylesheet" href="/static/css/catalogo.css?v=76">
</head>
<body class="auth-page">
    <main class="auth-card">
        <p class="eyebrow">Recuperar acesso</p>
        <h1>Esqueci minha senha</h1>
        <p>Digite seu e-mail de cadastro para receber o link de redefinicao.</p>
        <form class="panel-form" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Enviar link</button>
        </form>
        <p><a href="{% url 'login' %}">Voltar para entrar</a></p>
    </main>
</body>
</html>
